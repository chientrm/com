- hosts: servers
  become: yes
  tasks:
      - docker_container:
            name: db
            image: mysql:8.0
            restart_policy: always
            state: started
            ports:
                - '3306:3306'
            volumes:
                - db:/var/lib/mysql
            env:
                MYSQL_USER: '{{ db_user }}'
                MYSQL_PASSWORD: '{{ db_password }}'
                MYSQL_RANDOM_ROOT_PASSWORD: '1'
