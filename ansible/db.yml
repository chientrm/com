- hosts: servers
  become: yes
  vars:
      databases:
          - name: wordpress
  tasks:
      - package:
            name: '{{ item }}'
            state: present
            with_items:
                - python3-mysqldb
                - mysql-server
      - service:
            name: mysql
            state: started
            enabled: yes
      - mysql_db:
            name: '{{ item.name }}'
            state: present
            login_user: root
            login_password: '{{ mysql_root_password }}'
        with_items: '{{ databases }}'
